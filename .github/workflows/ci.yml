name: ci

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true

      - run: deno fmt --check
      - run: deno lint

      - run: deno ci
      - run: deno check mod.ts --frozen
      - run: deno test -A --frozen
